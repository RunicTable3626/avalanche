services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: actnet
      POSTGRES_USER: actnet
      POSTGRES_PASSWORD: actnet-dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ../infra/migrations:/docker-entrypoint-initdb.d:ro

volumes:
  pgdata:
