name: Avalanche
options:
  bundleIdPrefix: org.avalanche
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.3"

targets:
  Avalanche:
    type: application
    platform: iOS
    sources:
      - Sources
      - path: ../Generated/app_core.swift
        group: Generated
    dependencies:
      - framework: ../AppCoreFFI.xcframework
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: org.avalanche.app
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: 1
        SWIFT_VERSION: "6.0"
        EXCLUDED_ARCHS[sdk=iphonesimulator*]: x86_64
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleName: Avalanche
        INFOPLIST_KEY_CFBundleDisplayName: Avalanche
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
